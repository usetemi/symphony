# Symphony Orchestrator — Fly.io deployment
# Polls Linear for issues, launches Claude Code per issue, delivers PRs.

app = "symphony-temi"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  # Workspace root on the persistent volume
  # Referenced by WORKFLOW.md front matter: workspace.root
  SYMPHONY_WORKSPACE_ROOT = "/data/workspaces"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[mounts]
  source = "symphony_data"
  destination = "/data"
